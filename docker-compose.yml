services:
  gluetun:
    image: qmcgaw/gluetun:latest
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${PROTON_WG_PRIVATE_KEY}
      - SERVER_COUNTRIES=${PROTON_SERVER_COUNTRIES:-Netherlands}
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
      - HTTP_CONTROL_SERVER_USERNAME=${GLUETUN_CONTROL_USER:-xdcc}
      - HTTP_CONTROL_SERVER_PASSWORD=${GLUETUN_CONTROL_PASS:-xdcc}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  backend:
    build: ./backend
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - /mnt/downloads:/app/downloads
    environment:
      - DOWNLOAD_DIR=/app/downloads
      - GLUETUN_CONTROL_USER=${GLUETUN_CONTROL_USER:-xdcc}
      - GLUETUN_CONTROL_PASS=${GLUETUN_CONTROL_PASS:-xdcc}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - gluetun
    restart: unless-stopped

volumes: {}
