services:
  gluetun:
    image: qmcgaw/gluetun:latest
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${PROTON_WG_PRIVATE_KEY}
      - SERVER_COUNTRIES=${PROTON_SERVER_COUNTRIES:-Netherlands}
      - HTTP_CONTROL_SERVER_PORT=9000
    ports:
      - "8080:8080"
    restart: unless-stopped

  backend:
    build: ./backend
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    volumes:
      - /mnt/downloads:/app/downloads
    environment:
      - DOWNLOAD_DIR=/app/downloads
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - gluetun
    restart: unless-stopped

volumes: {}
