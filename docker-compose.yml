services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - downloads:/app/downloads
    environment:
      - DOWNLOAD_DIR=/app/downloads
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  downloads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./downloads
